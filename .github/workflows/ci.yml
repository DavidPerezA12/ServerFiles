name: CI Mac mini

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: [self-hosted, macOS, ARM64, mac-mini]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck and build
        run: pnpm build

      - name: Test
        run: pnpm test

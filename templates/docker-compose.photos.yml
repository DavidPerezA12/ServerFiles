services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-v2}
    container_name: serverfiles-immich-server
    restart: unless-stopped
    ports:
      - "2283:2283"
    environment:
      DB_HOSTNAME: immich-database
      DB_USERNAME: ${SERVERFILES_IMMICH_DB_USERNAME:-postgres}
      DB_PASSWORD: ${SERVERFILES_IMMICH_DB_PASSWORD:-serverfilesimmich}
      DB_DATABASE_NAME: ${SERVERFILES_IMMICH_DB_DATABASE:-immich}
      REDIS_HOSTNAME: immich-redis
    volumes:
      - ./data/immich/library:/data
      - /etc/localtime:/etc/localtime:ro
    depends_on:
      - immich-redis
      - immich-database
    healthcheck:
      disable: false

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-v2}
    container_name: serverfiles-immich-machine-learning
    restart: unless-stopped
    volumes:
      - immich-model-cache:/cache
    healthcheck:
      disable: false

  immich-redis:
    image: docker.io/valkey/valkey:9
    container_name: serverfiles-immich-redis
    restart: unless-stopped
    healthcheck:
      test: redis-cli ping || exit 1

  immich-database:
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    container_name: serverfiles-immich-postgres
    restart: unless-stopped
    environment:
      POSTGRES_PASSWORD: ${SERVERFILES_IMMICH_DB_PASSWORD:-serverfilesimmich}
      POSTGRES_USER: ${SERVERFILES_IMMICH_DB_USERNAME:-postgres}
      POSTGRES_DB: ${SERVERFILES_IMMICH_DB_DATABASE:-immich}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - ./data/immich/postgres:/var/lib/postgresql/data
    shm_size: 128mb
    healthcheck:
      disable: false

volumes:
  immich-model-cache: {}

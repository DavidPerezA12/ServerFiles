services:
  postgres:
    image: postgres:16-alpine
    container_name: serverfiles-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: serverfiles
      POSTGRES_PASSWORD: serverfiles
      POSTGRES_DB: serverfiles
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: serverfiles-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ./data/redis:/data

  mongodb:
    image: mongo:7
    container_name: serverfiles-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - ./data/mongodb:/data/db

  adminer:
    image: adminer:latest
    container_name: serverfiles-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: serverfiles-uptime-kuma
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - ./data/uptime-kuma:/app/data
